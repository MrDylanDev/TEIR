# ============================================================
# TEIR - Docker Compose
# Orquestación: MySQL 8.0 + Django/Gunicorn + Nginx
# ============================================================

services:

  # -------------------- Base de Datos --------------------
  db:
    image: mysql:8.0
    container_name: teir_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secure_pass_2026}
      MYSQL_DATABASE: ${DB_NAME:-tem_dbv2}
      MYSQL_USER: teir_user
      MYSQL_PASSWORD: teir_secure_pass_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3307:3306"  # Puerto 3307 en host para no conflictar con MySQL local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --innodb-buffer-pool-size=256M
      --max-connections=100
    networks:
      - teir_network

  # -------------------- Aplicación Django --------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teir_web
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=teir_user
      - DB_PASSWORD=teir_secure_pass_2026
      - DB_NAME=tem_dbv2
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teir_network

  # -------------------- Nginx Reverse Proxy --------------------
  nginx:
    image: nginx:alpine
    container_name: teir_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - teir_network

# -------------------- Volúmenes Persistentes --------------------
volumes:
  mysql_data:
    driver: local
    name: teir_mysql_data
  static_files:
    driver: local
    name: teir_static_files
  media_files:
    driver: local
    name: teir_media_files

# -------------------- Red Interna --------------------
networks:
  teir_network:
    driver: bridge
    name: teir_network
