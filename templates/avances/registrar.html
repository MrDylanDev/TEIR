{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Avance | TEM</title>
  <link rel="stylesheet" href="{% static 'Desarrollador/css/desarrollador.css' %}">
</head>
<body style="background: #000; color: white; display: block; padding: 40px;">

  <div style="max-width: 600px; margin: 0 auto; background: #0a0a0a; padding: 30px; border-radius: 12px; border: 1px solid #222;">
    
    <!-- MENSAJES DE ERROR O EXITO -->
    {% if messages %}
        <div style="margin-bottom: 25px;">
            {% for message in messages %}
                <div style="padding: 15px; border-radius: 8px; margin-bottom: 10px; background: {% if message.tags == 'error' %}#f44336{% elif message.tags == 'warning' %}#ff9800{% else %}#4CAF50{% endif %}; color: white; font-weight: bold; border-left: 5px solid rgba(0,0,0,0.2);">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <h1 style="font-weight: 300;">Registrar Avance</h1>
    <p style="opacity: 0.7; margin-bottom: 20px;">Proyecto: <strong>{{ proyecto.titulo }}</strong></p>

    <form method="post">
      {% csrf_token %}
      
      <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px;">Descripción del progreso</label>
          <textarea name="descripcion" required placeholder="¿Qué has hecho hoy?" style="width: 100%; min-height: 120px; background: #111; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px;"></textarea>
      </div>

      <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px;">Hito a completar</label>
          <select name="entregable_id" required style="width: 100%; background: #111; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; font-size: 14px;">
              <option value="">-- Selecciona el hito que has terminado --</option>
              {% for hito in hitos_pendientes %}
                  <option value="{{ hito.id }}">{{ hito.titulo }}</option>
              {% empty %}
                  <option value="" disabled>⚠️ No hay hitos pendientes definidos por la empresa.</option>
              {% endfor %}
          </select>
          <small style="opacity: 0.5; margin-top: 5px; display: block;">Al guardar, este hito se marcará como terminado automáticamente.</small>
      </div>

      <div style="margin-bottom: 20px;">
          <label style="display: block; margin-bottom: 8px;">URL de evidencia (Opcional)</label>
          <input type="url" name="archivo_url" placeholder="https://github.com/... o Google Drive" style="width: 100%; background: #111; color: white; border: 1px solid #333; padding: 10px; border-radius: 8px;">
      </div>

      <div style="display: flex; gap: 15px; margin-top: 30px;">
          <button type="submit" style="background: white; color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer;">Guardar Avance</button>
          <a href="{% url 'dashboard_desarrollador' %}" style="background: #222; color: white; border: 1px solid #333; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center;">Cancelar</a>
      </div>
    </form>
  </div>

</body>
</html>
