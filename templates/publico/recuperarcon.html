{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | TEM</title>
    <link rel="stylesheet" href="{% static 'publico/css/stylesrecon.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
</head>

<body>

    <div class="logo">TEM</div>

    <div class="container">
        <form class="form" method="post" action="{% url 'recuperar' %}">
            {% csrf_token %}

            <div class="form-header">
                <h2>Recuperar contraseña</h2>
                <p>Ingresa tu correo electrónico para recibir instrucciones</p>
            </div>

            <div class="field">
                <input type="email" name="email" required>
                <label>Correo electrónico</label>
            </div>

            <button type="submit">Enviar instrucciones</button>

            <div class="extra">
                <a href="{% url 'login' %}">Volver al inicio de sesión</a>
            </div>

        </form>
    </div>

</body>

</html>
