{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | TEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #000; --border: rgba(255,255,255,0.08); 
        --border-focus: rgba(255,255,255,0.25);
        --text: #fff; --text-muted: rgba(255,255,255,0.45); 
        --text-muted-2: rgba(255,255,255,0.65);
      }
      body {
        background: var(--bg); color: var(--text);
        font-family: 'Inter', sans-serif;
        min-height: 100vh; display: flex; justify-content: center; align-items: center;
        padding: 40px 20px; position: relative;
      }
      body::before {
        content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      }
      .container {
        position: relative; z-index: 1;
        width: 100%; max-width: 440px;
        background: rgba(10,10,10,0.85); backdrop-filter: blur(28px);
        border: 1px solid var(--border); border-radius: 20px;
        padding: 44px 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        animation: fadeInUp 0.5s ease both;
      }
      @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
      
      .logo { text-align: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 24px; color: #fff; }
      .form-header h2 { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
      .form-header p { text-align: center; color: var(--text-muted-2); font-size: 14.5px; margin-bottom: 32px; line-height: 1.6; }
      
      .field { margin-bottom: 20px; display: flex; flex-direction: column-reverse; }
      .field label { margin-bottom: 8px; color: var(--text-muted-2); font-size: 13.5px; font-weight: 600; }
      input {
        width: 100%; padding: 13px 16px; font-family: 'Inter', sans-serif;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; color: #fff; font-size: 14.5px; transition: all 0.2s;
      }
      input:focus {
        outline: none; background: rgba(255,255,255,0.06); border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
      }
      input:focus + label { color: #fff; }
      
      button[type="submit"] {
        width: 100%; padding: 14px; margin-top: 14px; font-family: 'Inter', sans-serif;
        background: #fff; color: #000; border: none; border-radius: 10px;
        font-weight: 800; font-size: 15px; cursor: pointer; transition: all 0.22s;
      }
      button[type="submit"]:hover { background: #e5e5e5; transform: translateY(-1px); }
      
      .extra { text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 14px; }
      .extra a { color: #fff; text-decoration: none; font-weight: 600; padding-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.3); transition: border-color 0.2s; }
      .extra a:hover { border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TEM</div>
        
        <form class="form" method="post" action="{% url 'recuperar' %}">
            {% csrf_token %}

            <div class="form-header">
                <h2>Recuperar contraseña</h2>
                <p>Ingresa tu correo electrónico asociado a la cuenta para recibir las instrucciones de recuperación.</p>
            </div>

            <div class="field">
                <input type="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                <label>Correo electrónico</label>
            </div>

            <button type="submit">Enviar instrucciones</button>

            <div class="extra">
                <a href="{% url 'inicio' %}">Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
