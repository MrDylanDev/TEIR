{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | TEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'publico/css/recuperarcon.css' %}">
</head>
<body>
    <div class="container">
        <div class="logo">TEM</div>
        
        <form class="form" method="post" action="{% url 'recuperar' %}">
            {% csrf_token %}

            <div class="form-header">
                <h2>Recuperar contraseña</h2>
                <p>Ingresa tu correo electrónico asociado a la cuenta para recibir las instrucciones de recuperación.</p>
            </div>

            <div class="field">
                <input type="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                <label>Correo electrónico</label>
            </div>

            <button type="submit">Enviar instrucciones</button>

            <div class="extra">
                <a href="{% url 'inicio' %}">Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
