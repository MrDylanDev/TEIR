{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña | TEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'publico/css/recuperarcon.css' %}">
    <style>
        .messages { margin-bottom: 20px; }
        .alert { padding: 10px; border-radius: 4px; margin-bottom: 10px; font-size: 14px; text-align: center; }
        .alert-error, .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TEM</div>
        
        <form class="form" method="post" action="{% url 'restablecer' token %}">
            {% csrf_token %}

            <div class="form-header">
                <h2>Elige una nueva contraseña</h2>
                <p>Ingresa tu nueva contraseña para acceder a la plataforma.</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <div class="field">
                <input type="password" name="password" placeholder="Nueva contraseña" required minlength="8">
                <label>Nueva contraseña</label>
            </div>

            <div class="field">
                <input type="password" name="password_confirm" placeholder="Confirma tu contraseña" required minlength="8">
                <label>Confirmar contraseña</label>
            </div>

            <button type="submit">Restablecer contraseña</button>
            
            <div class="extra">
                <a href="{% url 'inicio' %}">Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
