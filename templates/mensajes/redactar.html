{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEM | Redactar Mensaje</title>
  <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'dashboard/css/dashboard.css' %}">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="{% static 'IMG/Logo.jpg' %}" alt="TEM">
      <div>
        <div class="sidebar-brand-text">TEM</div>
        <div class="sidebar-brand-sub">Mensajería</div>
      </div>
    </div>
    <div class="sidebar-group" style="padding-top:20px;">
      <a class="nav-item" href="{% url 'mensajeria_inbox' %}"><i class="fa fa-arrow-left"></i><span>Volver a Mensajes</span></a>
    </div>
  </aside>
  <div class="main-wrapper">
    <header class="top-header">
      <div class="top-header-title">Mensajería <span>/ Nuevo Mensaje</span></div>
    </header>
    <main class="main-content" style="display:flex; justify-content:center;">
      <div style="max-width:640px; width:100%;">
        <div class="page-header">
          <div>
            <div class="page-title"><i class="fa fa-pen-to-square" style="margin-right:10px; color:var(--text-muted);"></i>Redactar Mensaje</div>
          </div>
        </div>
        <div class="card">
          <form method="post" style="display:flex; flex-direction:column; gap:16px;">
            {% csrf_token %}

            <div class="form-group">
              <label class="form-label">Para</label>
              <select name="receptor" required style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13.5px; color:var(--text-primary); background:var(--card-bg); font-family:inherit;">
                <option value="">Selecciona un usuario...</option>
                {% for u in usuarios %}
                  <option value="{{ u.id }}" {% if para_id == u.id %}selected{% endif %}>{{ u.nombre|default:u.username }} ({{ u.get_rol_display }})</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Proyecto Relacionado <span style="font-weight:400; color:var(--text-muted);">(Opcional)</span></label>
              <select name="proyecto" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13.5px; color:var(--text-primary); background:var(--card-bg); font-family:inherit;">
                <option value="">Ninguno</option>
                {% for p in proyectos %}
                  <option value="{{ p.id }}" {% if proyecto_pre == p.id %}selected{% endif %}>{{ p.titulo }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Asunto</label>
              <input type="text" name="titulo" required placeholder="Escribe el asunto del mensaje" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13.5px; color:var(--text-primary); background:var(--card-bg); font-family:inherit;">
            </div>

            <div class="form-group">
              <label class="form-label">Mensaje</label>
              <textarea name="contenido" required placeholder="Escribe tu mensaje aquí..." style="width:100%; min-height:200px; padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13.5px; color:var(--text-primary); background:var(--card-bg); font-family:inherit; line-height:1.6; resize:vertical; outline:none;"></textarea>
            </div>

            <div style="border-top:1px solid var(--border); padding-top:18px; display:flex; gap:12px;">
              <a href="{% url 'mensajeria_inbox' %}" class="btn btn-secondary" style="flex:1; justify-content:center;">Cancelar</a>
              <button type="submit" class="btn btn-primary" style="flex:2; justify-content:center;">
                <i class="fa fa-paper-plane"></i> Enviar Mensaje
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
