{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="shortcut icon" href="{% static 'IMG/Logo.jpg' %}" type="image/x-icon">
  <meta charset="UTF-8">
  <title>Editar Perfil | TEM</title>
  <style>
      body { 
          background: #000; 
          color: white; 
          display: flex; 
          align-items: center; 
          justify-content: center; 
          min-height: 100vh; 
          margin: 0;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .container { 
          max-width: 500px; 
          width: 100%; 
          background: #0a0a0a; 
          padding: 40px; 
          border-radius: 20px; 
          border: 1px solid #1a1a1a;
          box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      h1 { font-weight: 300; font-size: 28px; margin-bottom: 30px; text-align: center; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; margin-bottom: 8px; font-size: 13px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
      .form-control {
          width: 100%;
          background: #111;
          color: white;
          border: 1px solid #222;
          padding: 12px 15px;
          border-radius: 10px;
          outline: none;
          font-size: 15px;
          transition: 0.3s;
          box-sizing: border-box;
      }
      .form-control:focus { border-color: #4CAF50; background: #161616; }
      textarea.form-control { resize: vertical; min-height: 100px; }
      
      .btn-submit { 
          background: #fff; 
          color: #000; 
          border: none; 
          padding: 14px; 
          border-radius: 10px; 
          font-weight: bold; 
          cursor: pointer; 
          flex: 1; 
          font-size: 15px;
          transition: 0.3s;
      }
      .btn-submit:hover { background: #4CAF50; color: #fff; }
      
      .btn-cancel { 
          background: transparent; 
          color: #666; 
          border: 1px solid #222; 
          padding: 14px; 
          border-radius: 10px; 
          text-decoration: none; 
          font-weight: bold; 
          text-align: center;
          font-size: 15px;
          transition: 0.3s;
      }
      .btn-cancel:hover { border-color: #f44336; color: #f44336; }
      
      .error-msg { color: #f44336; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Configuración de Perfil</h1>
    
    <form method="post">
      {% csrf_token %}
      
      {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <p class="error-msg">{{ error }}</p>
            {% endfor %}
        </div>
      {% endfor %}

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 30px;">
          <button type="submit" class="btn-submit">Guardar Cambios</button>
          <a href="{% if user.rol == 'empresa' %}{% url 'dashboard_empresa' %}{% else %}{% url 'dashboard_desarrollador' %}{% endif %}" class="btn-cancel">Cancelar</a>
      </div>
    </form>
  </div>

</body>
</html>
