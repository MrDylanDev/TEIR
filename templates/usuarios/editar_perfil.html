{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Perfil | TEM</title>
  <link rel="stylesheet" href="{% static 'empresa/css/empresa.css' %}">
  <style>
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
      .form-control {
          width: 100%;
          background: #000;
          color: white;
          border: 1px solid #333;
          padding: 12px;
          border-radius: 8px;
          outline: none;
      }
      .form-control:focus { border-color: #4CAF50; }
  </style>
</head>
<body style="background: #0f0f0f; color: white; display: block; padding: 40px;">

  <div style="max-width: 600px; margin: 0 auto; background: #111; padding: 35px; border-radius: 12px; border: 1px solid #222;">
    <h1 style="font-weight: 300; margin-bottom: 30px;">Completar mi Perfil</h1>
    
    <form method="post">
      {% csrf_token %}
      
      {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <small style="opacity: 0.5;">{{ field.help_text }}</small>
            {% endif %}
            {% for error in field.errors %}
                <p style="color: #f44336; font-size: 13px; margin-top: 5px;">{{ error }}</p>
            {% endfor %}
        </div>
      {% endfor %}

      <div style="display: flex; gap: 15px; margin-top: 30px;">
          <button type="submit" style="background: white; color: black; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1;">Guardar Cambios</button>
          <a href="{% if user.rol == 'empresa' %}{% url 'dashboard_empresa' %}{% else %}{% url 'dashboard_desarrollador' %}{% endif %}" style="background: #222; color: white; border: 1px solid #333; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center;">Cancelar</a>
      </div>
    </form>
  </div>

</body>
</html>
