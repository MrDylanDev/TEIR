# ============================================================
# TEIR - Configuración Nginx
# Reverse Proxy + Archivos Estáticos
# ============================================================

upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # ---- Tamaño máximo de archivos (subida de fotos, archivos de proyecto) ----
    client_max_body_size 10M;

    # ---- Headers de Seguridad ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Compresión Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Archivos Estáticos (servidos directamente por Nginx) ----
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Archivos Media (subidos por usuarios) ----
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- Health Check Endpoint (para Docker healthcheck) ----
    location /health/ {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ---- Proxy a Django/Gunicorn ----
    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ---- Bloquear acceso a archivos sensibles ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Favicon (evitar logs 404) ----
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
